name: CI-CD Pipeline
   
on:
  push:
    branches: [ "main" ]
             
jobs:
  build-deploy:
    runs-on: ubuntu-latest                       
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
                                           
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
                                                                                     
      - name: Build JAR
        run: mvn clean package -DskipTests
                                                                                                   
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
                                                                                                                                            
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/java-app:v1                                                                                                                                                      
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/java-app:v1
                                                                                                                                                                                   - name: Setup Kubeconfig
         run:  |                                                                                                                                                                       echo "${{ secrets.KUBECONFIG }}" > kubeconfig                                                                                                                               echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV
      - name: Deploy to K8s
        run: |                                                                                                                                                                        kubectl apply -f deployment.yaml                                                                                                                                            kubectl apply -f service.yaml
          kubectl apply -f ingress.yaml
